name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck, build, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  rules:
    name: Firestore security rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Firestore emulator needs a JVM.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      # Test-only deps not in package.json (kept out of the app bundle/lockfile).
      - run: npm install --no-save @firebase/rules-unit-testing@4
      - run: npm install -g firebase-tools
      - run: npm run test:rules
        env:
          RUN_RULES_TESTS: 'true'
